plugins:
  npn_critique_reply_enabled:
    default: true
    client: true

  npn_critique_reply_enabled_category_ids:
    default: ""
    type: list
    list_type: category
    client: true

  npn_critique_reply_allowed_group_ids:
    default: ""
    type: group_list
    list_type: compact
    allow_any: false
    client: true

  npn_critique_reply_debug_enabled:
    default: false
    client: true

  # Gates the compact "Start a thoughtful critique" invitation panel
  # rendered above the post stream on eligible critique topics. Set
  # to false to turn off just the panel — the footer "Start a Critique"
  # button is unaffected.
  npn_critique_reply_show_below_op:
    default: true
    client: true

  npn_critique_reply_button_label:
    default: "Start a Critique"
    client: true

  npn_critique_reply_visual_notes_enabled:
    default: false
    client: true

  npn_critique_reply_visual_notes_allowed_group_ids:
    default: ""
    type: group_list
    list_type: compact
    allow_any: false
    client: true

  # Server-side critique workspace drafts. When true, the modal
  # autosaves to PluginStore and restores on next open across any
  # browser/device for the same user/topic.
  npn_critique_reply_server_drafts_enabled:
    default: true
    client: true

  # Drafts older than this are ignored on load (and may be cleaned up
  # by future tasks). 0 disables expiry.
  npn_critique_reply_draft_ttl_days:
    default: 30
