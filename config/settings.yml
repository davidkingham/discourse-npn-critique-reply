plugins:
  npn_critique_reply_enabled:
    default: true
    client: true

  npn_critique_reply_enabled_category_ids:
    default: ""
    type: list
    list_type: category
    client: true

  npn_critique_reply_allowed_group_ids:
    default: ""
    type: group_list
    list_type: compact
    allow_any: false
    client: true

  npn_critique_reply_debug_enabled:
    default: false
    client: true

  # Gates the compact "Start a thoughtful critique" invitation panel
  # rendered above the post stream on eligible critique topics. Set
  # to false to turn off just the panel — the footer "Start a Critique"
  # button is unaffected.
  npn_critique_reply_show_below_op:
    default: true
    client: true

  npn_critique_reply_button_label:
    default: "Start a Critique"
    client: true

  npn_critique_reply_visual_notes_enabled:
    default: false
    client: true

  npn_critique_reply_visual_notes_allowed_group_ids:
    default: ""
    type: group_list
    list_type: compact
    allow_any: false
    client: true

  # Gates the entire Processing Example workflow (download reference
  # image + upload one processed example into the critique reply).
  # On by default — processing examples are part of NPN culture and
  # photographers opt OUT per-topic via the submission form
  # (npn_processing_examples_allowed topic custom field). Turning
  # this off globally hides the UI everywhere and the server-side
  # endpoints silently drop any processing-example payload.
  npn_critique_reply_processing_examples_enabled:
    default: true
    client: true

  # Server-side critique workspace drafts. When true, the modal
  # autosaves to PluginStore and restores on next open across any
  # browser/device for the same user/topic.
  npn_critique_reply_server_drafts_enabled:
    default: true
    client: true

  # EXPERIMENTAL (Phase-1 spike): dock the Critique Workspace to the
  # bottom of the screen like the Discourse composer and disable the
  # modal backdrop's pointer-events so the topic behind it stays
  # mouse-selectable (select text -> Copy to Critique with the
  # workspace open). Purely a CSS/positioning experiment on the
  # existing modal — the DModal focus trap still applies, so keyboard
  # focus is still captured. Off by default; flip on to evaluate the
  # docked feel before the larger panel refactor.
  npn_critique_reply_docked_experiment:
    default: false
    client: true

  # Drafts older than this are ignored on load (and may be cleaned up
  # by future tasks). Inactivity-based: each autosave bumps the
  # draft's updated_at, so the window resets on activity. Set to 0
  # to disable expiry.
  npn_critique_reply_draft_ttl_days:
    default: 30

  # EXPERIMENTAL: replace the plain critique <textarea> with Discourse's
  # rich (ProseMirror/WYSIWYG) DEditor. The stored value stays markdown
  # in both modes, so drafts, preview, and post composition are
  # unchanged. The formatting toolbar is hidden behind a small "Aa"
  # reveal (which also exposes the built-in Markdown/WYSIWYG toggle).
  # Off by default — flip on to run the round-trip / cursor /
  # context-switch spike before any wider rollout.
  npn_critique_reply_rich_editor_experiment:
    default: false
    client: true
