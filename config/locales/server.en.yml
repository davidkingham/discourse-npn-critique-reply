en:
  npn_critique_reply:
    errors:
      empty_raw: "Write a critique before posting."
      cannot_reply: "You do not have permission to reply to this topic."
      create_failed: "Couldn't create that reply. Please try again."
  site_settings:
    npn_critique_reply_enabled: "Master switch for the NPN critique-reply plugin. When off, the footer button, OP invitation panel, modal route, draft endpoints, and serializer metadata are all hidden."
    npn_critique_reply_enabled_category_ids: "Categories in which the critique-reply helper is active. Leave empty to fall back to topic metadata (topics flagged as submissions by the sibling plugin)."
    npn_critique_reply_allowed_group_ids: "Groups whose members may use the critique-reply helper. Leave empty to allow all logged-in users who can reply to the topic. Staff always have access."
    npn_critique_reply_debug_enabled: "When enabled, the modal + server log diagnostic info (export/upload/draft/visual-notes flow) for verification. Off in production."
    npn_critique_reply_show_below_op: "Show the compact 'Start a thoughtful critique' invitation panel below the first post on eligible critique topics. Independent of the footer 'Start a Critique' button — disable this to hide just the panel."
    npn_critique_reply_button_label: "Label for the 'Start a Critique' button. Overrides the default translation when non-blank. Does not apply to the 'Resume Critique Draft' label shown when a draft exists."
    npn_critique_reply_visual_notes_enabled: "Enable the Visual Notes annotation tools (numbered pins, crop suggestion, eye path, attention pull, strong area) in the critique workspace. When on, eligible users can place annotations that are exported as a flattened JPEG into the posted reply; structured annotation metadata is persisted on the post for future reopen/overlay features."
    npn_critique_reply_visual_notes_allowed_group_ids: "Groups whose members may use Visual Notes in addition to staff. Leave empty for staff-only access."
    npn_critique_reply_server_drafts_enabled: "Save critique workspace drafts (text + selected image version + annotations) on the server so the user can pick up where they left off across browsers and devices. Drafts are scoped per user / per topic."
    npn_critique_reply_draft_ttl_days: "Discard saved drafts older than this many days of inactivity. Each autosave bumps the timestamp, so the window only counts down once the user stops touching the draft. Set to 0 to disable expiry."
