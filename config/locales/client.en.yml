        area_note_clear: "Clear area notes"
        area_note_a11y_label: "Area %{label}"
        # Per-marker textarea line — appended only when the critic
        # types in the popover and clicks Add note. No filler is
        # inserted on marker creation or on Skip; the [label] prefix
        # keeps the textarea reference tied to the visual marker.
        area_note_line_template: "[%{label}] %{text}"
        # Popover that appears after each Area marker is placed
        # (mirrors the numbered-notes popover pattern).
        area_note_popover_title: "Area note"
        area_note_popover_dialog_label: "Add a note for this area"
        area_note_popover_placeholder: "What's notable about this area?"
        # Legacy Attention Pull keys — retained because some older
        # drafts and existing annotations may still reference them
