        eye_path_status:
          one: "Eye path: %{count} point"
          other: "Eye path: %{count} points"
        # Multi-path status — count is the number of eye paths created.
        eye_path_status_n:
          one: "%{count} eye path"
          other: "%{count} eye paths"
        # Per-path textarea line — appended only when the critic types
