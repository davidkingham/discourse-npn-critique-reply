en:
  js:
    npn_critique_reply:
      start_button: "Start a Critique"
      start_button_title: "Start a guided critique"
      # Shown on the same footer button + invitation panel when the
      # topic serializer reports a saved server-side draft for the
      # current user. Signals at a glance that there's work waiting,
      # so the user knows clicking will pick up where they left off.
      resume_button: "Resume Critique Draft"
      resume_button_title: "Pick up your saved critique draft"

      # Compact, single-action invitation panel rendered below the OP
      # on eligible critique topics. The panel is a second entry point
      # to the workspace modal — the footer "Start a Critique" button
      # and the native Reply button remain in place too, so this panel
      # only carries the one action.
      invitation_panel:
        title: "Start a thoughtful critique"
        description: "Keep the image and request in view while you write, with optional visual notes if helpful."
        aria_label: "Start a thoughtful critique"
        # Counterparts shown when a saved server draft exists for this
        # user/topic. The panel keeps its same shape; only the copy
        # and the action label change.
        resume_title: "Resume your critique draft"
        resume_description: "Pick up where you left off — your text and visual annotations are saved."
        resume_aria_label: "Resume your critique draft"

      modal:
        title: "Start a Critique"
        intro: "Use the image and suggested prompts as a starting point. You can edit or delete anything before posting."
        request_heading: "The photographer asked for"
        critique_style: "Critique style"
        feedback_focus: "Feedback focus"
        weekly_challenge: "Weekly Challenge"
        weekly_challenge_dates: "Dates"
        critique_type: "Critique type"
        specific_questions: "Specific questions"
        feedback_areas: "Feedback areas"
        visual_examples: "Visual examples"
        image_reworks: "Image reworks"
        welcome: "Welcome"
        not_requested: "Not requested"
        no_request_found: "No specific critique request was found for this topic. The questions below are a general starting point."
        # Questions-to-consider section. Prompts are reference material
        # only — nothing here ever inserts text into the critic's
        # textarea. The default trio adapts to the photographer's
        # requested critique style and feedback focus; "More ideas"
        # opens a grouped bank of additional questions to think with.
        questions_to_consider: "Questions to consider"
        more_ideas_show: "More ideas"
        more_ideas_hide: "Hide more ideas"
        recommended: "Recommended"
        your_critique: "Your critique"
        textarea_placeholder: "Write your critique here in your own voice."
        reference_image: "Image & Visual Notes"
        image_alt: "Image being critiqued"
        image_alt_with_title: "Image being critiqued: %{title}"
        image_alt_versioned: "%{label} image being critiqued"
        image_alt_versioned_with_title: "%{label} image being critiqued: %{title}"
        version_selector_label: "Choose image version"
        showing_version: "Showing %{label}"
        revision_note: "Revision note: %{note}"
        post_critique: "Post Critique"
        posting: "Posting…"
        # Edit-existing-critique flow. Same modal, primary action
        # flipped to PUT the saved post + visual_notes instead of
        # POST a new reply.
        edit_critique_button: "Edit my Critique"
        edit_critique_button_title: "Reopen the critique workspace to edit the text or visual annotations on this post"
        update_critique: "Update critique"
        updating: "Updating…"
        critique_updated: "Critique updated."
        edit_in_composer: "Edit in Composer"
        reply_normally: "Reply Normally"
        cancel: "Cancel"
        critique_posted: "Critique posted."
        critique_posted_with_notes: "Critique posted with visual notes."
        validation_empty: "Write a critique or use the prompts first."
        post_failed: "Couldn't post your critique. Please try again."

        # Visual notes — async export + upload pipeline ----------------
        preparing_visual_notes: "Preparing visual notes…"
        uploading_visual_notes: "Uploading visual notes…"
        posting_critique: "Posting critique…"
        visual_notes_alt: "visual notes"
        visual_notes_heading_original: "Visual notes based on the original image:"
        visual_notes_heading_revision: "Visual notes based on %{label}:"
        visual_notes_load_failed: "Couldn't load the reference image for export. Check your connection or try a different image version."
        visual_notes_export_failed: "Couldn't export the visual notes image. The reference image may be hosted on a server that blocks cross-origin export."
        visual_notes_upload_failed: "Couldn't upload the visual notes image. Please try again."
        visual_notes_generic_failure: "Couldn't include the visual notes image. Please try again."
        # Fallback actions in the error banner — let the critic post or
        # transfer the critique text without the visual-notes image when
        # the export/upload pipeline fails.
        post_without_visual_notes: "Post without visual notes"
        continue_without_visual_notes: "Continue without visual notes"
        # Edit in Composer: shown when the composer already has unsaved
        # text (in-memory or saved draft). Three buttons handle the merge.
        edit_existing_message: "The composer already has text. How would you like to combine it with your critique?"
        edit_append: "Append critique"
        edit_replace: "Replace with critique"
        # Reply Normally: shown when the user clicks the escape hatch
        # while the workspace textarea still has unsaved text. The
        # server-side draft is intentionally NOT cleared by this
        # flow, so the user can resume from where they left off.
        confirm_reply_normally: "Open a normal reply? Your critique workspace draft will stay saved for next time."

        # Server-side critique workspace drafts. Drafts are stored per
        # user/topic in PluginStore and restore automatically on open.
        drafts:
          status_saving: "Saving…"
          status_saved: "Draft saved"
          status_error: "Couldn't save draft"
          restored: "Draft restored"
          discard: "Discard draft"
          discard_confirm_message: "Discard this critique draft?"
          discard_confirm_yes: "Discard draft"
          discard_confirm_no: "Cancel"
          # Notice rendered above the workspace when the saved draft
          # referenced an image version that's no longer available.
          image_version_missing: "This draft was started from an image version that is no longer available, so visual notes were not restored."
          # Notice when the saved draft's image version still exists but
          # a newer revision is available since the draft was started.
          image_version_outdated: "This draft was started on %{label}. A newer revision is available."

        submission_types:
          image_critique: "Image Critique"
          weekly_challenge: "Weekly Challenge"
          project_critique: "Project Critique"

        # Current upstream schema: critique_style + feedback_focus
        critique_styles:
          initial_reaction: "Initial Reaction"
          standard: "Standard Critique"
          in_depth: "In-Depth Critique"

        # Plural hash — value labels for `feedback_focus`. Renamed from the
        # singular form to avoid colliding with `modal.feedback_focus` above
        # (which is the string label "Feedback focus"). Matches the
        # `submission_types` / `critique_styles` pluralization pattern.
        feedback_focuses:
          technical_help: "Technical Help"
          composition: "Composition"
          processing: "Processing"
          color: "Color"
          tonal_balance: "Tonal Balance"
          artistic_expressive: "Artistic / Expressive Feedback"
          artistic_technical: "Artistic + Technical"
          emotional_impact: "Emotional Impact"
          project_direction: "Project Direction"

        # Future/richer schema: critique_type + feedback_area
        critique_types:
          standard: "Standard Critique"
          in_depth: "In-Depth Critique"
          initial_reaction: "Initial Reaction"
          technical_help: "Technical Help"
          artistic_expressive: "Artistic / Expressive Feedback"
          project_critique: "Project Critique"

        feedback_area:
          composition: "Composition"
          processing: "Processing"
          exposure: "Exposure"
          color: "Color"
          light: "Light"
          mood: "Mood"
          technical: "Technical"
          emotional_impact: "Emotional impact"
          storytelling: "Storytelling"
          artistic_intent: "Artistic intent"

      visual_notes:
        # Toolbar group + numbered-notes (pins)
        toolbar_label: "Visual annotation tools"
        add: "Add visual notes"
        # User-facing toolbar label shortened to "Notes" (the toolbar
        # is growing — 7 tools — so the longer "Numbered notes" only
        # appears in tooltips / a11y labels now). Internal schema kind
        # stays `pin`.
        numbered_notes: "Notes"
        done: "Done with notes"
        clear: "Clear notes"
        hint: "Click the image to add numbered visual notes."
        pin_label: "Visual note %{number}"
        remove_note: "Remove note %{number}"
        # Crop suggestion. Toolbar label shortened to "Crop"; tooltip
        # keeps the descriptive form.
        crop_suggestion: "Crop"
        crop_done: "Done with crop"
        crop_hint: "Drag to suggest a crop."
        crop_present_hint: "The full image will be posted with this crop overlay."
        crop_clear: "Clear crop"
        crop_remove: "Remove crop"
        crop_replace: "Replace crop"
        crop_a11y_label: "Crop suggestion"
        # Inserted into the textarea when the user creates a crop and
        # either typed nothing in the popover before confirming or
        # took no action. Just the [Crop] token — the cooked-post
        # decorator styles it as a dark-grey pill so the prose
        # connects visually to the on-image crop. (The decorator
        # also matches the legacy uppercase [CROP] for posts
        # critiqued before this rename, so old posts still get the
        # styled pill.)
        crop_starter: "[Crop]"
        # Textarea line appended when the user types a description in
        # the crop popover and clicks Add note: "[Crop] {text}".
        # Parallel to attention_pull_line_template etc.
        crop_line_template: "[Crop] %{text}"
        # Popover that opens after the user drags a crop rectangle
        # (mirrors the Attention Pull / Strong Area / Arrow flow).
        crop_popover_title: "Crop suggestion"
        crop_popover_dialog_label: "Add a note for this crop suggestion"
        crop_popover_placeholder: "Why this crop?"
        crop_ratio_label: "Aspect ratio"
        crop_ratio_free: "Free"
        # Eye path / Visual Flow tool
        eye_path: "Eye path"
        eye_path_done: "Done with eye path"
        eye_path_hint: "Click the image in the order your eye moves through it."
        eye_path_clear: "Clear eye path"
        eye_path_clear_all: "Clear all eye paths"
        eye_path_remove: "Remove eye path"
        eye_path_remove_last: "Remove last point"
        eye_path_new: "New eye path"
        eye_path_new_title: "Start another eye path without leaving the tool"
        eye_path_a11y_label:
          one: "Eye path with %{count} point"
          other: "Eye path with %{count} points"
        # Variant used by the a11y list when multi-path support is in
        # play — each path has its own row prefixed by its label (E1,
        # E2, ...) so the entries stay distinguishable.
        eye_path_a11y_label_n:
          one: "Eye path %{label} with %{count} point"
          other: "Eye path %{label} with %{count} points"
        # Status replaces the placement hint once at least one point
        # exists — visible feedback that clicks registered now that
        # there are no on-image waypoint markers.
        eye_path_status:
          one: "Eye path: %{count} point"
          other: "Eye path: %{count} points"
        # Multi-path status — count is the number of eye paths created.
        eye_path_status_n:
          one: "%{count} eye path"
          other: "%{count} eye paths"
        # Per-path textarea line — appended only when the critic types
        # in the popover and clicks Add note. No filler on creation
        # or on Skip; the [label] prefix anchors the textarea
        # reference to the path's start dot label.
        eye_path_line_template: "[%{label}] %{text}"
        # Legacy starter — kept for any in-flight session referencing
        # it, but no longer inserted by the modal.
        eye_path_starter: "My eye moves through the image like this..."
        # Attention Pull tool — observational marker for areas that pull
        # attention. Wording avoids "distraction" / "problem" framing.
        # Toolbar label shortened to "Attention"; tooltip keeps the full
        # descriptive form.
        attention_pull: "Attention"
        attention_pull_done: "Done with attention pull"
        attention_pull_hint: "Drag on the image to mark an area that pulls your attention."
        attention_pull_remove: "Remove selected"
        attention_pull_clear: "Clear attention pulls"
        attention_pull_a11y_label: "Attention pull %{label}"
        # Per-marker textarea line — appended only when the critic
        # types in the popover and clicks Add note. No filler is
        # inserted on marker creation or on Skip; the [label] prefix
        # keeps the textarea reference tied to the visual marker.
        attention_pull_line_template: "[%{label}] %{text}"
        # Legacy starter — kept around for any in-flight session that
        # references it, but no longer inserted by the modal.
        attention_pull_starter: "This area pulls my attention because..."
        # Popover that appears after each attention-pull marker is
        # placed (mirrors the numbered-notes popover pattern).
        attention_pull_popover_title: "Attention pull"
        attention_pull_popover_dialog_label: "Add a note for this attention pull"
        attention_pull_popover_placeholder: "What's pulling your attention here?"
        # Strong Area tool — positive counterpart to Attention Pull.
        # Observational/supportive tone; never "best/correct/winner".
        strong_area: "Strong area"
        strong_area_done: "Done with strong area"
        strong_area_hint: "Drag on the image to mark an area that feels especially strong."
        strong_area_remove: "Remove selected"
        strong_area_clear: "Clear strong areas"
        strong_area_a11y_label: "Strong area %{label}"
        # Per-marker textarea line — appended only when the critic
        # types in the popover and clicks Add note. No filler.
        strong_area_line_template: "[%{label}] %{text}"
        # Popover for each Strong Area marker.
        strong_area_popover_title: "Strong area"
        strong_area_popover_dialog_label: "Add a note for this strong area"
        strong_area_popover_placeholder: "What's working well here?"
        # Direction Arrow — one-way arrow for "this leads my eye
        # toward..." / "this gesture points back toward the subject."
        # Distinct from Eye Path (curve through 2+ points) and from
        # Attention Pull (bounded area with an A<N> label).
        direction_arrow: "Arrow"
        direction_arrow_title: "Draw a one-way arrow showing direction or visual pull"
        direction_arrow_done: "Done with arrow"
        direction_arrow_hint: "Drag from start to end to mark direction or visual pull."
        direction_arrow_remove: "Remove selected"
        direction_arrow_clear: "Clear arrows"
        direction_arrow_a11y_label: "Arrow %{label}"
        direction_arrow_line_template: "[%{label}] %{text}"
        direction_arrow_popover_title: "Arrow"
        direction_arrow_popover_dialog_label: "Add a note for this arrow"
        direction_arrow_popover_placeholder: "What direction does this lead the eye?"
        # Relationship Arrow — two-way arrow for "these areas relate
        # / echo / balance / compete with each other."
        relationship_arrow: "Relationship"
        relationship_arrow_title: "Draw a two-way arrow showing a relationship between areas"
        relationship_arrow_done: "Done with relationship"
        relationship_arrow_hint: "Drag between two areas to mark a relationship, echo, or tension."
        relationship_arrow_remove: "Remove selected"
        relationship_arrow_clear: "Clear relationships"
        relationship_arrow_a11y_label: "Relationship %{label}"
        relationship_arrow_line_template: "[%{label}] %{text}"
        relationship_arrow_popover_title: "Relationship"
        relationship_arrow_popover_dialog_label: "Add a note for this relationship"
        relationship_arrow_popover_placeholder: "How are these areas related?"
        # Popover that appears when the eye path crosses its second
        # point — gives the critic a chance to describe the flow.
        eye_path_popover_title: "Eye path"
        eye_path_popover_dialog_label: "Add a note for the eye path"
        eye_path_popover_placeholder: "Describe how your eye moves..."
        # Inline note popover — anchored near the pin the user just placed.
        note_popover_title: "Visual note %{number}"
        note_popover_dialog_label: "Add note for visual note %{number}"
        note_popover_placeholder: "What are you noticing here?"
        note_popover_add: "Add note"
        note_popover_skip: "Skip"
        # A11y list snippet shown after the pin label when a note exists.
        a11y_note_snippet: "— %{note}"
        # Image-version switching. The unified key replaces older
        # crop-specific / pin-specific variants now that any combination
        # of pins, crop, and eye path may be present.
        confirm_clear_all_on_switch: "Switch image version? Visual annotations for the current image will be cleared."
        confirm_clear_on_switch: "Switch image version? Visual notes for the current image will be cleared."
        confirm_clear_with_crop_on_switch: "Switch image version? Visual notes and crop suggestion for the current image will be cleared."
        switch_and_clear: "Switch and clear annotations"
        # Accessible annotation list (keyboard / screen reader mirror)
        a11y_list_label: "Visual annotations"
        a11y_list_summary: "Visual annotations (%{count})"
        a11y_select: "Select"
        a11y_remove: "Remove"

      # Template title/description pairs are kept for the future
      # "Choose different prompts" surface. Step 3's modal does not render
      # them — its prompt list comes from the prompts helper instead.
      templates:
        initial_reaction:
          title: "Initial Reaction"
          description: "A quick first response to what stands out, what you feel, and what keeps pulling your attention."
        standard:
          title: "Standard Critique"
          description: "A balanced critique with observations, questions, and possible directions to explore."
        in_depth:
          title: "In-Depth Critique"
          description: "A more detailed response considering composition, light, processing, intent, and alternatives."
        technical_help:
          title: "Technical Help"
          description: "Focused feedback on technical or processing questions."
        expressive_feedback:
          title: "Expressive Feedback"
          description: "A response centered on mood, meaning, emotional impact, and personal interpretation."
        project_critique:
          title: "Project Critique"
          description: "Feedback on sequence, cohesion, direction, consistency, and next steps."
        blank:
          title: "Open blank reply"
          description: "Skip the helper and write a normal reply."
