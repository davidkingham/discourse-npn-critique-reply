en:
  js:
    npn_critique_reply:
      start_button: "Start a Critique"
      start_button_title: "Open the critique workspace"
      # Shown on the same footer button + invitation panel when the
      # topic serializer reports a saved server-side draft for the
      # current user. Signals at a glance that there's work waiting,
      # so the user knows clicking will pick up where they left off.
      resume_button: "Resume Critique Draft"
      resume_button_title: "Pick up your saved critique draft"

      # Compact, single-action invitation panel rendered below the OP
      # on eligible critique topics. The panel is a second entry point
      # to the workspace modal — the footer "Start a Critique" button
      # and the native Reply button remain in place too, so this panel
      # only carries the one action.
      invitation_panel:
        title: "Critique Workspace"
        description: "Open a dedicated workspace for your critique, with the image, request, and photographer’s notes close at hand — and optionally mark up the image with visual notes."
        aria_label: "Open the critique workspace"
        # Counterparts shown when a saved server draft exists for this
        # user/topic. The panel keeps its same shape; only the copy
        # and the action label change.
        resume_title: "Resume your critique draft"
        resume_description: "Pick up where you left off — your text and visual annotations are saved."
        resume_aria_label: "Resume your critique draft"

      # Persistent dock shown after the workspace is minimized, on the
      # topic the critique belongs to. Reassures the critic their work is
      # saved and gives a one-click way back.
      dock:
        aria_label: "Critique in progress"
        title: "Critique in progress"
        saved: "Draft saved"
        resume: "Resume Critique"
        dismiss_title: "Hide — your draft stays saved"

      # Shown when the native Quote button is used on a critique-eligible
      # topic with nothing open: a small dialog lets the critic choose
      # whether the quote starts a critique or a normal reply.
      quote_choice:
        title: "Quote into…"
        message: "Where should this quote go?"
        start: "Start a Critique"
        reply: "Quote in a reply"

      modal:
        title: "Critique Workspace"
        intro: "Write your critique with the image and photographer’s context close at hand."
        # Bottom-fade "more below" cue at the bottom of a pane when
        # content extends past the visible viewport. The cue is a
        # quiet text + chevron riding on top of a subtle background
        # gradient, not a chrome button — keeps the workspace from
        # feeling busy. The aria-label is the full descriptive form;
        # the label key is the visible text shown next to the
        # chevron.
        scroll_more_below: "Show more content below"
        scroll_more_below_label: "More below"
        request_heading: "Photographer’s request"
        # Collapsed-by-default disclosure between Photographer's Request
        # and Questions to Consider. Surfaces the cooked OP content so
        # critics can refer back to what the photographer wrote without
        # leaving the workspace. Lazy-loaded on first expand.
        photographers_notes:
          title: "Photographer’s Notes"
          # Trigger button (under the Photographer's Request) that opens
          # the notes overlay panel.
          view: "View Photographer’s Notes"
          close: "Close photographer’s notes"
          hint: "View the photographer’s description, questions, and details."
          loading: "Loading the photographer’s post…"
          failed: "Couldn’t load the photographer’s post. You can close and reopen the original topic in a new tab if needed."
          quote: "Quote"
          quote_aria: "Quote selected text"
        critique_style: "Style"
        feedback_focus: "Focus"
        weekly_challenge: "Weekly Challenge"
        weekly_challenge_dates: "Dates"
        critique_type: "Critique type"
        specific_questions: "Specific questions"
        feedback_areas: "Feedback areas"
        visual_examples: "Visual examples"
        image_reworks: "Image reworks"
        welcome: "Welcome"
        not_requested: "Not requested"
        no_request_found: "No specific critique request was found for this topic. The questions below are a general starting point."
        # Questions-to-consider section. Prompts are reference material
        # only — nothing here ever inserts text into the critic's
        # textarea. The default trio adapts to the photographer's
        # requested critique style and feedback focus; "More ideas"
        # opens a grouped bank of additional questions to think with.
        questions_to_consider: "Questions to consider"
        more_ideas_show: "More ideas"
        more_ideas_hide: "Hide more ideas"
        recommended: "Recommended"
        your_critique: "Your critique"
        textarea_placeholder: "Write your critique here in your own voice."
        # Writing-context switcher. One textarea serves two contexts —
        # the overall critique and the selected image's notes — flipped
        # via a small segmented control above the field. Labels differ
        # for single- vs multi-image critiques (Visual Notes vs Image
        # Notes); the heading + helper copy track the active context.
        writing_context:
          switcher_label: "Choose what you're writing"
          overall: "Overall Critique"
          visual_notes: "Visual Notes"
          image_notes: "Image Notes"
          editing_image: "Writing notes for Image %{current} of %{total}."
          # Tooltip + accessible label for the numeric badge on the Image
          # Notes tab. Counting rule: visual annotations on the currently
          # selected image (NOT the image number, NOT image-note text).
          annotation_count:
            one: "%{count} visual annotation"
            other: "%{count} visual annotations"
          visual_notes_heading: "Visual Notes"
          image_notes_heading: "Image Notes"
        # Quiet hint sitting next to the Insert-link button above the
        # textarea — signals that the field behaves like the composer
        # for the parts that matter (links, mentions, markdown).
        markdown_supported: "Markdown, links, and @mentions are supported."
        # Insert-link toolbar + sub-modal copy. The toolbar is a small
        # affordance above the critique textarea; the sub-modal opens on
        # top of the critique modal and writes Markdown link syntax at
        # the caret via TextareaTextManipulation.
        toolbar:
          label: "Critique field formatting tools"
          insert_link: "Insert link"
          formatting_show: "Show formatting tools"
          formatting_hide: "Hide formatting tools"
          link_modal:
            title: "Insert link"
            url_label: "URL"
            url_placeholder: "https://example.com"
            text_label: "Link text (optional)"
            insert: "Insert"
            cancel: "Cancel"
            markdown_note: "The link may look a little different while you’re editing, but it will appear as a normal clickable link in the preview and final post."
        reference_image: "Reference Image"
        # New section headings + helper copy for the Optional Visual
        # Notes / Optional Processing Example sections that frame the
        # visual tools as supporting material. The previous version
        # buried this under "Image & Visual Notes" which read like
        # markup tools were the workspace's primary purpose.
        optional_visual_notes_heading: "Optional Visual Notes"
        optional_processing_example_heading: "Optional Processing Example"
        optional_processing_example_helper: "Upload an edited example only when it helps show a possible direction."
        image_alt: "Image being critiqued"
        image_alt_with_title: "Image being critiqued: %{title}"
        image_alt_versioned: "%{label} image being critiqued"
        image_alt_versioned_with_title: "%{label} image being critiqued: %{title}"
        version_selector_label: "Choose image version"
        showing_version: "Showing %{label}"
        revision_note: "Revision note: %{note}"
        # Submission multi-image picker. Only renders when the OP
        # attached 2+ images; the critic uses these pills (or the
        # chevron arrows on either side) to flip between them without
        # showing all images at once.
        image_picker:
          label: "Choose submission image"
          previous: "Previous image"
          next: "Next image"
          # Accessible names for each image pill. `_active` is used when the
          # image already has critique work (annotations or notes) so the
          # activity dot isn't conveyed by color/shape alone; the inactive
          # form states the absence explicitly. Selected state is carried
          # separately by aria-pressed on the pill.
          pill: "Image %{number}, no image notes"
          pill_active: "Image %{number}, has image notes"
        post_critique: "Post Critique"
        posting: "Posting…"
        # Edit-existing-critique flow. Same modal, primary action
        # flipped to PUT the saved post + visual_notes instead of
        # POST a new reply.
        edit_critique_button: "Edit my Critique"
        edit_critique_button_title: "Reopen the critique workspace to edit the text or visual annotations on this post"
        update_critique: "Update critique"
        updating: "Updating…"
        critique_updated: "Critique updated."
        # The standard-composer escape hatch. Renamed from "Edit in
        # Composer" → "Use Standard Composer" so the action reads as
        # "leave the workspace and switch to the normal Discourse
        # composer" rather than "open yet another editor". A short
        # fallback label is available for tight layouts.
        edit_in_composer: "Use Standard Composer"
        edit_in_composer_short: "Standard Composer"
        edit_in_composer_title: "Move this reply to the standard Discourse composer"
        # Transition confirmation shown when the user clicks "Use
        # Standard Composer". Copy varies depending on whether visual
        # notes / processing examples exist — those workflows aren't
        # editable in the standard composer, so the stronger variant
        # also nudges the user to preview first.
        edit_in_composer_confirm_title: "Switch to standard composer?"
        edit_in_composer_confirm_message_text_only: "Your critique text will open in the standard Discourse composer. Visual workspace tools and preview aren't available there. Your workspace draft is kept — you can return any time."
        edit_in_composer_confirm_message_with_visuals: "Your written critique will open in the standard composer. Visual notes and processing examples aren't editable there. Your workspace draft is kept — return to the workspace to finish them, or preview first to check the final layout."
        edit_in_composer_confirm_continue: "Use Standard Composer"
        # Preview-Critique step. The primary footer button now opens an
        # in-modal preview of the composed reply rather than posting
        # directly; Post Critique fires only from the preview's footer.
        preview_critique: "Preview Critique"
        preview_critique_disabled_title: "Add critique text, visual notes, or a processing example before previewing."
        preview_header_title: "Preview Critique"
        preview_header_subtitle: "Review how your critique will appear before posting."
        preview_back_to_edit: "Back to Edit"
        preview_section_visual_notes: "Visual Notes"
        preview_section_processing_example: "Processing Example"
        preview_section_critique: "Critique"
        preview_empty_text: "No written critique yet."
        cancel: "Cancel"
        # Minimize — closes the workspace but keeps the draft and shows a
        # "Critique in progress" dock on the topic so the critic can step
        # away (e.g. to Copy Quote another reply) and return without
        # fear of losing work. Minimize force-saves first and only docks
        # on success.
        minimize:
          label: "Minimize"
          title: "Minimize — your draft stays saved; resume it from the dock."
          save_failed: "Couldn’t save your draft, so the workspace stayed open. Check your connection and try again."
        fullscreen:
          enter: "Enter fullscreen"
          exit: "Exit fullscreen"
        # Experimental docked workspace (npn_critique_reply_docked_experiment).
        docked:
          resize: "Drag to resize the critique workspace (Up/Down arrows to adjust)"
        critique_posted: "Critique posted."
        critique_posted_with_notes: "Critique posted with visual notes."
        validation_empty: "Write a critique or use the prompts first."
        post_failed: "Couldn't post your critique. Please try again."

        # Processing Example workflow. A critic downloads the reference
        # image, processes it externally, and uploads ONE processing
        # example to include alongside their critique. Always called
        # "processing example" in user-facing copy — never "revision",
        # "rework", "edited version", or "improved version".
        # "Revision" is reserved for the photographer's own next image.
        processing_example:
          section_title: "Processing Example"
          # Right-aligned action label on the Optional Processing
          # Example disclosure summary. Reads as "Add" before any
          # upload, "Manage" once a processing example exists, and
          # "Hide" while the section is expanded (regardless of
          # uploaded state).
          disclosure_add: "Add"
          disclosure_hide: "Hide"
          disclosure_manage: "Manage"
          # Legacy inline-link strings — no longer rendered after the
          # disclosure cleanup; kept for backward compat in case any
          # transient draft state still references them.
          inline_add: "Add processing example"
          inline_manage: "Manage processing example"
          # Compact label for the header quick-access trigger that opens
          # the popover. Two variants so the action subtly reflects
          # whether an example has been uploaded without being loud.
          menu_trigger: "Processing Example"
          menu_trigger_uploaded: "Processing Example ✓"
          helper: "Download the reference image if you want to demonstrate a processing idea."
          download: "Download Reference Image"
          upload: "Upload Processing Example"
          uploaded: "Processing example uploaded"
          replace: "Replace Example"
          remove: "Remove Example"
          preview_alt: "Processing example preview"
          large_alt: "Processing example uploaded by the critic"
          image_alt: "processing example"
          heading_original: "Processing example based on the original image:"
          heading_revision: "Processing example based on %{label}:"
          upload_failed: "Couldn't upload the processing example. Please try again."
          generic_failure: "Couldn't add the processing example. Please try again."

        # Large-image view toggle. Appears once a processing example
        # has been uploaded so the critic can choose which image to
        # see at full size. Annotations stay anchored to the
        # reference; the toggle is purely a viewing affordance.
        large_image_view:
          label: "View"
          reference: "Reference Image"
          processing_example: "Processing Example"
          # Status caption swapped in for "Showing Revision N" when
          # the processing-example view is active. Surfaces what the
          # critic is looking at without naming the underlying
          # reference version (annotations still track that
          # separately).
          showing_processing_example: "Showing Processing Example"
          # Compact note shown in place of the visual-tools toolbar
          # while the processing example is the active large view.
          # Reminds the user that annotations live on the reference
          # — they're not gone, just not editable from this view.
          tools_apply_to_reference: "Visual notes are available on the Reference Image tab"

        # Re-exposed top-level alias for `large_image_view.showing_processing_example`
        # so the existing `showingVersionLabel` getter can format both
        # captions with one i18n() call. Keeps the template branch on
        # the getter side rather than the markup side.
        showing_processing_example: "Showing Processing Example"

        # Mobile-only labels for the disclosure summary buttons. On
        # narrow viewports the Visual tools panel and the Processing
        # Example panel collapse behind a tappable summary so the
        # writing area sits closer to the top of the scroll. Desktop
        # hides the summary buttons via CSS — these strings never
        # surface there.
        mobile:
          visual_tools_summary: "Visual tools"

        # Visual Focus Mode — a layout toggle that hides the write
        # pane and lets the image use most of the modal width.
        # Especially useful on 14-inch laptops where the default
        # two-pane split leaves the image too small for precise
        # annotation work. Enter / Exit labels chosen so the button
        # reads as a temporary view change, not a mode the user has
        # to commit to.
        visual_focus:
          enter: "Larger Image"
          enter_title: "Hide the writing area and view the image at full modal width"
          # "Return to Critique" reads more accurately than "Return to
          # Writing" because the normal workspace surfaces image, tools,
          # questions, and writing — not just the textarea. Beta
          # feedback flagged "Back to Writing" as confusing.
          exit: "Return to Critique"
          exit_title: "Exit Larger Image and return to the full critique workspace"

        # Visual notes — async export + upload pipeline ----------------
        preparing_visual_notes: "Preparing visual notes…"
        # Shown while iterating multiple annotated images during the
        # Post Critique flatten+upload pipeline. %{current} / %{total}
        # both count visually-annotated images, NOT the total
        # submission size.
        preparing_visual_notes_n: "Preparing visual notes (%{current} of %{total})…"
        uploading_visual_notes: "Uploading visual notes…"
        posting_critique: "Posting critique…"
        visual_notes_alt: "visual notes"
        visual_notes_heading_original: "Visual notes based on the original image:"
        visual_notes_heading_revision: "Visual notes based on %{label}:"
        # Heading for visual-notes sections on secondary submission
        # images (Image 2..N) when the OP attached multiple. Label is
        # the picker pill text ("Image 2", "Image 3"...) so the post
        # body reads as a faithful echo of what the critic was looking
        # at.
        visual_notes_heading_labeled: "Visual notes based on %{label}:"
        visual_notes_load_failed: "Couldn't load the reference image for export. Check your connection or try a different image version."
        visual_notes_export_failed: "Couldn't export the visual notes image. The reference image may be hosted on a server that blocks cross-origin export."
        visual_notes_upload_failed: "Couldn't upload the visual notes image. Please try again."
        visual_notes_generic_failure: "Couldn't include the visual notes image. Please try again."
        # Fallback actions in the error banner — let the critic post or
        # transfer the critique text without the visual-notes image when
        # the export/upload pipeline fails.
        post_without_visual_notes: "Post without visual notes"
        continue_without_visual_notes: "Continue without visual notes"
        # Self-service diagnostic copy. The error banner shows a small
        # "Copy diagnostic" button on every failure that snapshots
        # pipeline state, browser info, server response, etc. into a
        # markdown JSON block on the clipboard — replaces back-and-
        # forth devtools walkthroughs for remote debugging.
        copy_diagnostic: "Copy diagnostic"
        copy_diagnostic_title: "Copy a diagnostic report to the clipboard. Paste it back so we can debug the failure."
        diagnostic_copied: "Diagnostic copied to clipboard."
        diagnostic_copy_failed: "Couldn’t copy automatically — see the browser console for the diagnostic object."
        # Edit in Composer: shown when the composer already has unsaved
        # text (in-memory or saved draft). Three buttons handle the merge.
        edit_existing_message: "The composer already has text. How would you like to combine it with your critique?"
        edit_append: "Append critique"
        edit_replace: "Replace with critique"

        # Server-side critique workspace drafts. Drafts are stored per
        # user/topic in PluginStore and restore automatically on open.
        drafts:
          status_saving: "Saving…"
          status_saved: "Draft saved"
          status_error: "Couldn't save draft"
          restored: "Draft restored"
          discard: "Discard draft"
          discard_confirm_message: "Discard this critique draft?"
          discard_confirm_yes: "Discard draft"
          discard_confirm_no: "Cancel"
          # Notice rendered above the workspace when the saved draft
          # referenced an image version that's no longer available.
          image_version_missing: "This draft was started from an image version that is no longer available, so visual notes were not restored."
          # Notice when the saved draft's image version still exists but
          # a newer revision is available since the draft was started.
          image_version_outdated: "This draft was started on %{label}. A newer revision is available."

        submission_types:
          image_critique: "Image Critique"
          weekly_challenge: "Weekly Challenge"
          project_critique: "Project Critique"

        # Current upstream schema: critique_style + feedback_focus
        critique_styles:
          initial_reaction: "Initial Reaction"
          standard: "Standard Critique"
          in_depth: "In-Depth Critique"

        # Plural hash — value labels for `feedback_focus`. Renamed from the
        # singular form to avoid colliding with `modal.feedback_focus` above
        # (which is the string label "Feedback focus"). Matches the
        # `submission_types` / `critique_styles` pluralization pattern.
        feedback_focuses:
          technical_help: "Technical Help"
          composition: "Composition"
          processing: "Processing"
          color: "Color"
          tonal_balance: "Tonal Balance"
          artistic_expressive: "Artistic / Expressive Feedback"
          artistic_technical: "Artistic + Technical"
          emotional_impact: "Emotional Impact"
          project_direction: "Project Direction"

        # Future/richer schema: critique_type + feedback_area
        critique_types:
          standard: "Standard Critique"
          in_depth: "In-Depth Critique"
          initial_reaction: "Initial Reaction"
          technical_help: "Technical Help"
          artistic_expressive: "Artistic / Expressive Feedback"
          project_critique: "Project Critique"

        feedback_area:
          composition: "Composition"
          processing: "Processing"
          exposure: "Exposure"
          color: "Color"
          light: "Light"
          mood: "Mood"
          technical: "Technical"
          emotional_impact: "Emotional impact"
          storytelling: "Storytelling"
          artistic_intent: "Artistic intent"

      visual_notes:
        # Toolbar group + numbered-notes (pins)
        toolbar_label: "Visual annotation tools"
        # Single contextual help line rendered below the visual tools
        # toolbar (and any active sub-tool controls). Replaces the
        # per-mode inline hints that used to scatter through the
        # secondary toolbar — beta feedback was that the help should be
        # ONE consistent place that updates when the user selects a
        # tool or sub-mode.
        tools_help:
          # Action-oriented: answer "what do I click / drag / draw
          # next?" not just "what is this tool for?" — beta testers
          # were unsure how to actually use a tool from purpose copy
          # alone.
          default: "Select a tool, then click or drag on the image to add a visual note."
          notes: "Click the image to place a numbered note, then write what you want to say about that spot."
          crop: "Drag on the image to suggest a crop. Use the handles to adjust it."
          crop_free: "Drag freely on the image to draw a crop suggestion."
          crop_named_ratio: "Drag on the image to draw a %{ratio} crop suggestion."
          crop_aspect_ratio: "Drag on the image to draw a crop using the selected aspect ratio."
          eye_path: "Choose Stroke or Points, then mark how your eye moves through the image."
          eye_path_stroke: "Drag on the image to draw the path your eye follows."
          eye_path_points: "Click the main stops in order. The path connects them automatically."
          area: "Choose Oval or Draw Area, then mark the region you want to discuss."
          area_oval: "Drag an oval around the area you want to discuss."
          area_draw: "Draw around the area you want to discuss. Release to finish the shape."
          arrow: "Drag from where the arrow should start to where it should point."
          relationship: "Drag between two parts of the image to show a visual connection."
          retrace: "Draw a new outline to replace this shape."
        # Area-shape sub-toggle. Shown only while the Area tool is
        # active. "Draw Area" (default) is the closed-polyline variant;
        # "Oval" is the geometric fallback.
        area_shape:
          label: "Area shape"
          oval: "Oval"
          draw_area: "Draw Area"
          oval_title: "Drag to draw an oval area"
          draw_area_title: "Draw a custom area"
        # Retrace replaces a path-shape marker's outline while keeping
        # its label and any associated note text. Visible only when a
        # path-shape Area marker is selected.
        retrace:
          button: "Retrace"
          cancel: "Cancel retrace"
          hint: "Draw a new outline to replace this shape."
        add: "Add visual notes"
        # User-facing toolbar label shortened to "Notes" (the toolbar
        # is growing — 7 tools — so the longer "Numbered notes" only
        # appears in tooltips / a11y labels now). Internal schema kind
        # stays `pin`.
        numbered_notes: "Notes"
        numbered_notes_title: "Click to place a numbered note"
        # Rotate / Flip tools. Two labeled buttons sitting at the end
        # of the visual-notes toolbar — they look like the other
        # tool buttons (icon + visible label) but each opens a
        # compact popover with 2 directions + Reset. Rotate/Flip are
        # not modes: clicking an option applies it immediately and
        # closes the menu.
        transform:
          # Cross-menu safety copy. The original photographer upload
          # is never mutated — what changes is the bitmap embedded in
          # the cooked critique reply. Surfaced once on each popover.
          original_unmodified: "This changes the critique view only. The original image is not modified."
          # Reset wipes both rotation and flips. Shared between the
          # two menus because rotation and flips live in one combined
          # transform state — splitting reset would risk leaving a
          # partially-applied transform hanging around.
          reset: "Reset orientation"
          reset_title: "Restore the original image orientation"
          rotate:
            label: "Rotate"
            title: "Rotate the image 90°"
            hint: "Choose left or right to rotate the image 90°."
            rotate_right: "Rotate right"
            rotate_left: "Rotate left"
            rotate_right_title: "Rotate the image 90 degrees clockwise"
            rotate_left_title: "Rotate the image 90 degrees counter-clockwise"
          flip:
            label: "Flip"
            title: "Mirror the image"
            hint: "Choose horizontal or vertical to mirror the image."
            flip_horizontal: "Flip horizontally"
            flip_vertical: "Flip vertically"
            flip_horizontal_title: "Mirror the image from left to right"
            flip_vertical_title: "Mirror the image from top to bottom"
        done: "Done with notes"
        clear: "Clear notes"
        # Hint copy intentionally describes WHAT each tool is for, not
        # only HOW to use it — beta testers reported the tools weren't
        # self-explanatory. Keep the tone calm and optional; the
        # workspace shouldn't read as a tutorial wall.
        hint: "Place numbered notes on specific parts of the image."
        pin_label: "Visual note %{number}"
        remove_note: "Remove note %{number}"
        # Crop suggestion. Toolbar label shortened to "Crop"; tooltip
        # keeps the descriptive form.
        crop_suggestion: "Crop"
        crop_suggestion_title: "Drag to suggest a crop"
        crop_done: "Done with crop"
        crop_hint: "Suggest a crop visually — the photographer's image isn't changed."
        crop_present_hint: "The full image will be posted with this crop overlay."
        crop_clear: "Clear crop"
        crop_remove: "Remove crop"
        crop_replace: "Replace crop"
        crop_a11y_label: "Crop suggestion"
        # Inserted into the textarea when the user creates a crop and
        # either typed nothing in the popover before confirming or
        # took no action. Just the [Crop] token — the cooked-post
        # decorator styles it as a dark-grey pill so the prose
        # connects visually to the on-image crop. (The decorator
        # also matches the legacy uppercase [CROP] for posts
        # critiqued before this rename, so old posts still get the
        # styled pill.)
        crop_starter: "[Crop]"
        # Textarea line appended when the user types a description in
        # the crop popover and clicks Add note: "[Crop] {text}".
        # Parallel to attention_pull_line_template etc.
        crop_line_template: "[Crop] %{text}"
        # Popover that opens after the user drags a crop rectangle
        # (mirrors the Attention Pull / Strong Area / Arrow flow).
        crop_popover_title: "Crop suggestion"
        crop_popover_dialog_label: "Add a note for this crop suggestion"
        crop_popover_placeholder: "Why this crop?"
        crop_ratio_label: "Aspect ratio"
        crop_ratio_free: "Free"
        # Eye path / Visual Flow tool
        eye_path: "Eye path"
        eye_path_title: "Mark how your eye moves"
        eye_path_done: "Done with eye path"
        # Completion action shown in the Eye Path sub-tool row (the main
        # tool button stays "Eye path", selected). Exits Eye Path mode;
        # the current path is preserved.
        eye_path_finish: "Finish Eye Path"
        eye_path_finish_title: "Finish and exit Eye Path; your path is kept"
        # Completion actions for the other tools, shown in the sub-tool row
        # (the tool's own toolbar button stays selected, like Eye Path).
        # Exit the tool; the work just placed is preserved.
        note_finish: "Finish Notes"
