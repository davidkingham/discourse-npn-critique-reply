        eye_path_hint: "Show how your eye moves through the image."
        eye_path_hint_stroke: "Drag along the image to draw the flow of your eye movement."
        eye_path_hint_points: "Click the main stops in the order your eye visits them."
        # Stroke / Points sub-toggle copy. Default mode is "stroke"
        # — the long-standing drag-to-trace flowing line. "Points"
        # is the click-to-add ordered stops variant.
        eye_path_mode:
          label: "Eye Path mode"
          stroke: "Stroke"
          points: "Points"
          stroke_title: "Drag to draw an eye path"
          points_title: "Click stops in eye path order"
