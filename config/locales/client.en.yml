        attention_pull: "Attention"
        attention_pull_done: "Done with attention pull"
        attention_pull_hint: "Drag on the image to mark an area that pulls your attention."
        attention_pull_remove: "Remove selected"
        attention_pull_clear: "Clear attention pulls"
        attention_pull_a11y_label: "Attention pull %{label}"
        attention_pull_line_template: "[%{label}] %{text}"
        attention_pull_starter: "This area pulls my attention because..."
        attention_pull_popover_title: "Attention pull"
        attention_pull_popover_dialog_label: "Add a note for this attention pull"
        attention_pull_popover_placeholder: "What's pulling your attention here?"
        # Strong Area tool — REMOVED from the toolbar as of the Area
        # unification. Existing strong_area annotations still render,
        # restore from drafts, and export; these keys remain so the
        # accessible annotation list and any legacy popovers continue
        # to label them correctly.
        strong_area: "Strong area"
        strong_area_done: "Done with strong area"
        strong_area_hint: "Drag on the image to mark an area that feels especially strong."
        strong_area_remove: "Remove selected"
        strong_area_clear: "Clear strong areas"
        strong_area_a11y_label: "Strong area %{label}"
        # Per-marker textarea line — appended only when the critic
        # types in the popover and clicks Add note. No filler.
        strong_area_line_template: "[%{label}] %{text}"
        # Popover for each Strong Area marker.
        strong_area_popover_title: "Strong area"
        strong_area_popover_dialog_label: "Add a note for this strong area"
        strong_area_popover_placeholder: "What's working well here?"
        # Direction Arrow — one-way arrow for "this leads my eye
        # toward..." / "this gesture points back toward the subject."
        # Distinct from Eye Path (curve through 2+ points) and from
        # Attention Pull (bounded area with an A<N> label).
        direction_arrow: "Arrow"
        direction_arrow_title: "Drag to draw an arrow"
        direction_arrow_done: "Done with arrow"
        direction_arrow_hint: "Point toward a detail or direction you want to discuss."
        direction_arrow_remove: "Remove selected"
        direction_arrow_clear: "Clear arrows"
        direction_arrow_a11y_label: "Arrow %{label}"
        direction_arrow_line_template: "[%{label}] %{text}"
        direction_arrow_popover_title: "Arrow"
        direction_arrow_popover_dialog_label: "Add a note for this arrow"
        direction_arrow_popover_placeholder: "What direction does this lead the eye?"
        # Relationship Arrow — two-way arrow for "these areas relate
        # / echo / balance / compete with each other."
        relationship_arrow: "Relationship"
        relationship_arrow_title: "Drag between two related areas"
        relationship_arrow_done: "Done with relationship"
        relationship_arrow_hint: "Show a visual connection between two parts of the image."
        relationship_arrow_remove: "Remove selected"
        relationship_arrow_clear: "Clear relationships"
        relationship_arrow_a11y_label: "Relationship %{label}"
        relationship_arrow_line_template: "[%{label}] %{text}"
        relationship_arrow_popover_title: "Relationship"
        relationship_arrow_popover_dialog_label: "Add a note for this relationship"
        relationship_arrow_popover_placeholder: "How are these areas related?"
        # Popover that appears when the eye path crosses its second
        # point — gives the critic a chance to describe the flow.
        eye_path_popover_title: "Eye path"
        eye_path_popover_dialog_label: "Add a note for the eye path"
        eye_path_popover_placeholder: "Describe how your eye moves..."
        # Inline note popover — anchored near the pin the user just placed.
        note_popover_title: "Visual note %{number}"
        note_popover_dialog_label: "Add note for visual note %{number}"
        note_popover_placeholder: "What are you noticing here?"
        note_popover_add: "Add note"
        note_popover_skip: "Skip"
        # Shared button labels for the per-tool description popovers
        # (pins, area, crop, eye path, arrows, etc.). Save requires a
        # non-empty description; Cancel removes the just-drawn marker
        # and closes the popover; Redraw also removes the marker but
        # leaves the tool armed so the next click/drag starts a fresh
        # one immediately.
        popover_save: "Save"
        popover_cancel: "Cancel"
        popover_redraw: "Redraw"
        # Inline hint shown under the input when text is empty — the
        # critic must add a description (or back out via Cancel /
        # Redraw) before the marker is committed.
        popover_description_required: "Add a description to save."
        # A11y list snippet shown after the pin label when a note exists.
        a11y_note_snippet: "— %{note}"
        # Image-version switching. The unified key replaces older
        # crop-specific / pin-specific variants now that any combination
        # of pins, crop, and eye path may be present.
        confirm_clear_all_on_switch: "Switch image version? Visual annotations for the current image will be cleared."
        confirm_clear_on_switch: "Switch image version? Visual notes for the current image will be cleared."
        confirm_clear_with_crop_on_switch: "Switch image version? Visual notes and crop suggestion for the current image will be cleared."
        switch_and_clear: "Switch and clear annotations"
        # Accessible annotation list (keyboard / screen reader mirror)
        a11y_list_label: "Visual annotations"
        a11y_list_summary: "Annotations (%{count})"
        a11y_select: "Select"
        a11y_remove: "Remove"

