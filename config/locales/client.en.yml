        # or on Skip; the [label] prefix anchors the textarea
        # reference to the path's start dot label.
        eye_path_line_template: "[%{label}] %{text}"
        # Legacy starter — kept for any in-flight session referencing
        # it, but no longer inserted by the modal.
        eye_path_starter: "My eye moves through the image like this..."
        # Area tool — unified replacement for the previous separate
        # Attention and Strong Area tools. One tool that marks any
        # area worth discussing; the meaning ("pulls attention",
        # "feels strong", "needs work") comes from the critic's
        # written response, not from the tool choice.
        #
        # Internal schema kind stays `attention_pull` so existing
        # annotations, drafts, exports, and posts keep working without
        # a migration. Only the user-facing copy changes.
        area_note: "Area"
        area_note_title: "Mark an area to discuss"
        area_note_done: "Done with area"
        area_note_hint: "Mark a region you want to discuss. Use an oval, or draw the area's outline."
